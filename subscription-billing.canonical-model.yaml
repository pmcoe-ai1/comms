  description: Subscription billing domain — plans, subscriptions, billing cycles, payments.
  domain: subscription-billing
  owners:
    - jane.smith
    - tom.baker
  prevHash: null
  changeReason: null
glossary:
  - id: subscription
    term: Subscription
    definition: >
      A recurring agreement between a customer and the platform to provide access to a plan in exchange for periodic
      payment. A subscription is active when payment is current and the trial period (if any) has not expired without
      conversion.
    examples:
      - Customer subscribes to Pro plan — a Subscription is created in trial status
    counterexamples:
      - A one-time purchase is not a Subscription
    precision:
      type: enum
      values:
        - trialing
        - active
        - past-due
        - cancelled
        - expired
    conceptVersion: '1.0'
  - id: plan
    term: Plan
    definition: >
      A named tier of service with a declared price, billing interval, and feature set. Plans are versioned — a customer
      subscribes to a specific plan version.
    conceptVersion: '1.0'
  - id: billing-cycle
    term: Billing Cycle
    definition: >
      The recurring period for which a subscription is charged. Defined by the plan's interval (monthly or annual). A
      billing cycle begins on the subscription's anchor date and ends on the next anchor date.
    precision:
      type: enum
      values:
        - monthly
        - annual
    conceptVersion: '1.0'
  - id: trial-period
    term: Trial Period
    definition: >
      An optional period at the start of a subscription during which the customer has full access but is not charged.
      Trial ends on trialEndsAt. If the customer does not cancel before trialEndsAt, the subscription converts to active
      and the first billing cycle begins.
    precision:
      type: range
      min: 0
      max: 90
      unit: days
    conceptVersion: '1.0'
  - id: proration
    term: Proration
    definition: >
      A partial charge or credit calculated when a subscription changes plan mid-cycle. The customer is charged or
      credited for the unused portion of the current billing cycle at the old plan price, and charged for the remaining
      portion at the new plan price.
    conceptVersion: '1.0'
  - id: dunning
    term: Dunning
    definition: >
      The process of retrying a failed payment on a declining schedule before marking the subscription as cancelled.
      Maximum 3 retry attempts over 7 days. If all retries fail, subscription moves to cancelled.
    precision:
      type: range
      min: 0
      max: 3
      unit: attempts
    conceptVersion: '1.0'
  - id: plan-price
    term: Plan Price
    definition: The recurring charge for one billing cycle of a plan in AUD.
    precision:
      type: range
      min: 0
      max: 99999.99
      unit: AUD
    conceptVersion: '1.0'
  - id: subscription-anchor-date
    term: Anchor Date
    definition: >
      The day of the month on which billing cycles begin and end. Set at subscription creation. Immutable — never
      changes even if the plan changes.
    conceptVersion: '1.0'
intents:
  - id: activate-trial-subscription
    name: Activate Trial Subscription
    description: >
      When a customer subscribes to a plan with a trial period, create the subscription in trialing status. Do not
      charge until the trial ends.
    status: approved
    approvedBy: jane.smith
    approvedAt: '2026-03-05T10:00:00Z'
    version: '1.0'
    priority: must
    glossaryRefs:
      - subscription
      - trial-period
      - plan
    tags:
      - subscriptions
      - trials
  - id: convert-trial-to-active
    name: Convert Trial to Active on Renewal
    description: >
      When a trialing subscription reaches its trialEndsAt date and the customer has not cancelled, convert it to active
      and charge the first billing cycle immediately.
    status: approved
    approvedBy: jane.smith
    approvedAt: '2026-03-05T10:00:00Z'
    version: '1.0'
    priority: must
    glossaryRefs:
      - subscription
      - trial-period
      - billing-cycle
    tags:
      - subscriptions
      - billing
  - id: renew-active-subscription
    name: Renew Active Subscription on Cycle End
    description: >
      When an active subscription reaches the end of its billing cycle, charge the customer for the next cycle and
      extend the subscription. If payment fails, move subscription to past-due and begin dunning.
    status: approved
    approvedBy: jane.smith
    approvedAt: '2026-03-05T10:00:00Z'
    version: '1.0'
    priority: must
    glossaryRefs:
      - subscription
      - billing-cycle
      - dunning
    tags:
      - subscriptions
      - billing
      - dunning
  - id: cancel-subscription
    name: Cancel Subscription at Period End
    description: >
      When a customer cancels, mark the subscription as cancelled effective at the end of the current billing cycle. Do
      not issue a refund for the current period. Access continues until the cycle ends.
    status: approved
    approvedBy: jane.smith
    approvedAt: '2026-03-05T10:00:00Z'
    version: '1.0'
    priority: must
    glossaryRefs:
      - subscription
      - billing-cycle
    tags:
      - subscriptions
      - cancellation
  - id: handle-dunning
    name: Handle Failed Payment with Dunning
    description: >
      When a subscription payment fails, move to past-due status and schedule a retry. Maximum 3 retry attempts. If all
      retries fail, cancel the subscription. If a retry succeeds, return to active.
    status: approved
    approvedBy: jane.smith
    approvedAt: '2026-03-05T10:00:00Z'
    version: '1.0'
    priority: must
    glossaryRefs:
      - dunning
      - subscription
    tags:
      - subscriptions
      - dunning
      - payments
  - id: view-subscription-details
    name: View Subscription Details
    description: >
      Retrieve subscription information for display purposes. Read-only operations that return subscription data
      without any mutations.
    status: approved
    approvedBy: jane.smith
    approvedAt: '2026-03-05T10:00:00Z'
    version: '1.0'
    priority: should
    glossaryRefs:
      - subscription
    tags:
      - subscriptions
      - read
scenarios:
  - id: subscription-created-in-trial
    intentRef: activate-trial-subscription
    given: a customer subscribes to Pro plan with 14-day trial
    when: subscribe-to-plan
    then: subscription is created in trialing status with trialEndsAt set
    coverageType: happy
    expectedResult: true
    entityRefs:
      - subscription
    priority: must-pass
    outputFieldRefs:
      - entityId: subscription
        fieldId: status
        value: trialing
  - id: subscription-created-without-trial
    intentRef: activate-trial-subscription
    given: a customer subscribes to Basic plan with no trial period
    when: subscribe-to-plan
    then: subscription is created in active status with trialEndsAt null
    coverageType: edge
    expectedResult: false
    fieldRefs:
      - entityId: subscription
        fieldId: status
        value: active
    entityRefs:
      - subscription
    priority: must-pass
  - id: trial-converts-to-active
    intentRef: convert-trial-to-active
    given: a trialing subscription whose trialEndsAt is in the past
    when: renew-subscription
    then: subscription status changes to active
    coverageType: happy
    expectedResult: true
    fieldRefs:
      - entityId: subscription
        fieldId: status
        value: trialing
      - entityId: subscription
        fieldId: trial-ends-at
        value: '2025-01-01T00:00:00Z'
    entityRefs:
      - subscription
    priority: must-pass
    outputFieldRefs:
      - entityId: subscription
        fieldId: status
        value: active
  - id: trial-not-converted-if-cancelled
    intentRef: convert-trial-to-active
    given: a cancelled subscription whose trialEndsAt is in the past
    when: renew-subscription
    then: subscription status remains cancelled
    coverageType: failure
    expectedResult: false
    fieldRefs:
      - entityId: subscription
        fieldId: status
        value: cancelled
    entityRefs:
      - subscription
    priority: must-pass
  - id: active-subscription-renewed
    intentRef: renew-active-subscription
    given: an active subscription with currentPeriodEnd in the past
    when: renew-subscription
    then: subscription remains active and currentPeriodEnd is extended
    coverageType: happy
    expectedResult: true
    fieldRefs:
      - entityId: subscription
        fieldId: status
        value: active
    entityRefs:
      - subscription
    priority: must-pass
  - id: renewal-fails-moves-to-past-due
    intentRef: renew-active-subscription
    given: an active subscription with currentPeriodEnd in the past and payment fails
    when: renew-subscription
    then: subscription moves to past-due with dunningAttempts set to 1
    coverageType: failure
    expectedResult: false
    fieldRefs:
      - entityId: subscription
        fieldId: status
        value: active
    entityRefs:
      - subscription
    priority: must-pass
  - id: active-subscription-cancelled
    intentRef: cancel-subscription
    given: an active subscription
    when: cancel-subscription
    then: subscription status is cancelled and cancelledAt is set
    coverageType: happy
    expectedResult: true
    fieldRefs:
      - entityId: subscription
        fieldId: status
        value: active
    entityRefs:
      - subscription
    priority: must-pass
    outputFieldRefs:
      - entityId: subscription
        fieldId: status
        value: cancelled
  - id: trialing-subscription-cancelled
    intentRef: cancel-subscription
    given: a trialing subscription
    when: cancel-subscription
    then: subscription status is cancelled
    coverageType: edge
    expectedResult: true
    fieldRefs:
      - entityId: subscription
        fieldId: status
        value: trialing
    entityRefs:
      - subscription
    priority: must-pass
    outputFieldRefs:
      - entityId: subscription
        fieldId: status
        value: cancelled
  - id: expired-subscription-cannot-be-cancelled
    intentRef: cancel-subscription
    given: an expired subscription
    when: cancel-subscription
    then: SUBSCRIPTION_NOT_CANCELLABLE error is returned
    coverageType: failure
    expectedResult: false
    fieldRefs:
      - entityId: subscription
        fieldId: status
        value: expired
    entityRefs:
      - subscription
    priority: must-pass
  - id: dunning-retry-succeeds
    intentRef: handle-dunning
    given: a past-due subscription with 1 dunning attempt
    when: retry-payment
    then: subscription returns to active with dunningAttempts reset to 0
    coverageType: happy
    expectedResult: true
    fieldRefs:
      - entityId: subscription
        fieldId: status
        value: past-due
      - entityId: subscription
        fieldId: dunning-attempts
        value: 1
    entityRefs:
      - subscription
    priority: must-pass
    outputFieldRefs:
      - entityId: subscription
        fieldId: dunning-attempts
        value: 2
  - id: dunning-exhausted-cancels-subscription
    intentRef: handle-dunning
    given: a past-due subscription with 3 dunning attempts
    when: retry-payment
    then: subscription is cancelled
    coverageType: failure
    expectedResult: true
    fieldRefs:
      - entityId: subscription
        fieldId: status
        value: past-due
      - entityId: subscription
        fieldId: dunning-attempts
        value: 3
    entityRefs:
      - subscription
    priority: must-pass
    outputFieldRefs:
      - entityId: subscription
        fieldId: dunning-attempts
        value: 4
scenarioCoverage:
  - intentRef: activate-trial-subscription
    deployGate: 100
    happyPathRequired: true
    edgeCaseMinimum: 1
    failurePathMinimum: 0
  - intentRef: convert-trial-to-active
    deployGate: 100
    happyPathRequired: true
    edgeCaseMinimum: 0
    failurePathMinimum: 1
  - intentRef: renew-active-subscription
    deployGate: 100
    happyPathRequired: true
    edgeCaseMinimum: 0
    failurePathMinimum: 1
  - intentRef: cancel-subscription
    deployGate: 100
    happyPathRequired: true
    edgeCaseMinimum: 1
    failurePathMinimum: 1
  - intentRef: handle-dunning
    deployGate: 100
    happyPathRequired: true
    edgeCaseMinimum: 0
    failurePathMinimum: 1
  - intentRef: view-subscription-details
    deployGate: 0
    happyPathRequired: false
    edgeCaseMinimum: 0
    failurePathMinimum: 0
entities:
  - id: plan
    name: Plan
    description: A named tier of service with price and billing interval.
    fields:
      - id: id
        name: id
        type: uuid
        required: true
        immutable: true
        systemField: true
        glossaryRef: plan
      - id: name
        name: name
        type: string
        required: true
        glossaryRef: plan
      - id: price
        name: price
        type: decimal
        required: true
        validation:
          min: 0
          max: 99999.99
        glossaryRef: plan-price
      - id: interval
        name: interval
        type: enum
        enumValues:
          - monthly
          - annual
        required: true
        glossaryRef: billing-cycle
      - id: trial-days
        name: trialDays
        type: integer
        required: false
        validation:
          min: 0
          max: 90
        glossaryRef: trial-period
        defaultValue: 0
      - id: is-active
        name: isActive
        type: boolean
        required: true
        defaultValue: true
      - id: created-at
        name: createdAt
        type: datetime
        required: true
        immutable: true
        systemField: true
    glossaryRef: plan
  - id: subscription
    name: Subscription
    description: A recurring billing agreement between a customer and a plan.
    fields:
      - id: id
        name: id
        type: uuid
        required: true
        immutable: true
        systemField: true
        glossaryRef: subscription
      - id: customer-id
        name: customerId
        type: uuid
        required: true
        immutable: true
        refEntity: customer
        glossaryRef: subscription
      - id: plan-id
        name: planId
        type: uuid
        required: true
        refEntity: plan
        glossaryRef: plan
      - id: status
        name: status
        type: enum
        enumValues:
          - trialing
          - active
          - past-due
          - cancelled
          - expired
        required: true
        glossaryRef: subscription
      - id: trial-ends-at
        name: trialEndsAt
        type: datetime
        required: false
        nullable: true
        glossaryRef: trial-period
      - id: current-period-start
        name: currentPeriodStart
        type: datetime
        required: true
        glossaryRef: billing-cycle
      - id: current-period-end
        name: currentPeriodEnd
        type: datetime
        required: true
        glossaryRef: billing-cycle
      - id: anchor-date
        name: anchorDate
        type: integer
        required: true
        immutable: true
        validation:
          min: 1
          max: 28
        glossaryRef: subscription-anchor-date
      - id: dunning-attempts
        name: dunningAttempts
        type: integer
        required: true
        validation:
          min: 0
          max: 4
        glossaryRef: dunning
        defaultValue: 0
      - id: cancelled-at
        name: cancelledAt
        type: datetime
        required: false
        nullable: true
      - id: created-at
        name: createdAt
        type: datetime
        required: true
        immutable: true
        systemField: true
      - id: updated-at
        name: updatedAt
        type: datetime
        required: true
        systemField: true
    lifecycle:
      transitions:
        - from: trialing
          to: active
          trigger: trial-ends-without-cancellation
        - from: trialing
          to: cancelled
          trigger: customer-cancels
        - from: active
          to: past-due
          trigger: payment-fails
        - from: active
          to: cancelled
          trigger: customer-cancels
        - from: active
          to: active
          trigger: renewal-succeeds
        - from: past-due
          to: active
          trigger: retry-payment-succeeds
        - from: past-due
          to: cancelled
          trigger: dunning-exhausted
        - from: cancelled
          to: active
          trigger: reactivation
      statusField: status
      initialState: trialing
    indexes:
      - fields:
          - customer-id
        unique: false
      - fields:
          - status
        unique: false
      - fields:
          - current-period-end
        unique: false
    softDelete: false
    glossaryRef: subscription
  - id: billing-record
