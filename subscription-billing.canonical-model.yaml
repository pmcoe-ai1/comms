        name: id
        type: uuid
        required: true
        immutable: true
        systemField: true
      - id: subscription-id
        name: subscriptionId
        type: uuid
        required: true
        immutable: true
        refEntity: subscription
      - id: type
        name: type
        type: enum
        enumValues:
          - charge
          - refund
          - credit
        required: true
        immutable: true
      - id: amount
        name: amount
        type: decimal
        required: true
        immutable: true
        validation:
          min: 0
          max: 99999.99
      - id: status
        name: status
        type: enum
        enumValues:
          - pending
          - succeeded
          - failed
        required: true
      - id: period-start
        name: periodStart
        type: datetime
        required: true
        immutable: true
      - id: period-end
        name: periodEnd
        type: datetime
        required: true
        immutable: true
      - id: attempt-number
        name: attemptNumber
        type: integer
        required: true
        validation:
          min: 1
          max: 3
        defaultValue: 1
      - id: created-at
        name: createdAt
        type: datetime
        required: true
        immutable: true
        systemField: true
    glossaryRef: billing-cycle
  - id: customer
    name: Customer
    description: A registered user who has one or more subscriptions.
    fields:
      - id: id
        name: id
        type: uuid
        required: true
        immutable: true
        systemField: true
      - id: email
        name: email
        type: string
        required: true
        unique: true
      - id: payment-method-id
        name: paymentMethodId
        type: string
        required: false
        nullable: true
      - id: created-at
        name: createdAt
        type: datetime
        required: true
        immutable: true
        systemField: true
    glossaryRef: subscription
rules:
  - id: activate-on-trial-start
    name: activateOnTrialStart
    entityRef: subscription
    intentRef: activate-trial-subscription
    description: >
      If the plan has a trial period (trialDays > 0), the subscription starts in trialing status with trialEndsAt set.
      If trialDays is 0, the subscription starts in active status immediately.
    condition:
      field: status
      operator: is-null
    action:
      type: set
      field: status
      value: trialing
      then:
        - type: emit-event
          event: subscription.trial-started
    scenarioRefs:
      - subscription-created-in-trial
      - subscription-created-without-trial
    priority: 1
  - id: convert-trial-on-renewal
    name: convertTrialOnRenewal
    entityRef: subscription
    intentRef: convert-trial-to-active
    description: >
      If a subscription is in trialing status and trialEndsAt is in the past, transition to active. If the subscription
      is not in trialing status, return unchanged.
    condition:
      and:
        - field: status
          operator: eq
          value: trialing
        - field: trial-ends-at
          operator: lt
          value:
            $temporal: now
    action:
      type: set
      field: status
      value: active
      then:
        - type: emit-event
          event: subscription.trial-converted
    scenarioRefs:
      - trial-converts-to-active
      - trial-not-converted-if-cancelled
    priority: 2
  - id: cancel-at-period-end
    name: cancelAtPeriodEnd
    entityRef: subscription
    intentRef: cancel-subscription
    description: >
      A subscription may be cancelled if it is in trialing or active status. Set status to cancelled and record
      cancelledAt timestamp. If the subscription is already expired or cancelled, throw SUBSCRIPTION_NOT_CANCELLABLE.
    condition:
      or:
        - field: status
          value: trialing
          operator: eq
        - field: status
          value: active
          operator: eq
    action:
      type: set
      field: status
      value: cancelled
      then:
        - type: set
          field: cancelled-at
          value:
            $temporal: now
    scenarioRefs:
      - active-subscription-cancelled
      - trialing-subscription-cancelled
      - expired-subscription-cannot-be-cancelled
    priority: 3
  - id: handle-dunning-retry
    name: handleDunningRetry
    entityRef: subscription
    intentRef: handle-dunning
    description: >
      If dunningAttempts is less than 3, the subscription may retry payment. If dunningAttempts equals 3, cancel the
      subscription — dunning exhausted.
    condition:
      and:
        - field: status
          value: past-due
          operator: eq
        - field: dunning-attempts
          value: 3
          operator: lte
    action:
      type: set
      field: dunning-attempts
      value:
        $field: dunning-attempts
        $op: add
        $value: 1
    scenarioRefs:
      - dunning-retry-succeeds
      - dunning-exhausted-cancels-subscription
    priority: 4
events:
  - id: subscription.created
    description: Fired when a new subscription is created.
    name: Subscription Created
    entityRef: subscription
  - id: subscription.activated
    description: Fired when a subscription moves to active status.
    name: Subscription Activated
    entityRef: subscription
  - id: subscription.cancelled
    description: Fired when a subscription is cancelled.
    name: Subscription Cancelled
    entityRef: subscription
  - id: subscription.past-due
    description: Fired when a subscription moves to past-due status.
    name: Subscription Past-due
    entityRef: subscription
  - id: subscription.renewed
    description: Fired when a subscription is successfully renewed.
    name: Subscription Renewed
    entityRef: subscription
  - id: subscription.trial-started
    description: Fired when a trial subscription is created.
    name: Subscription Trial-started
    entityRef: subscription
  - id: subscription.trial-converted
    description: Fired when a trial converts to active.
    name: Subscription Trial-converted
    entityRef: subscription
  - id: billing.charge-succeeded
    description: Fired when a billing charge succeeds.
    name: Billing Charge-succeeded
    entityRef: billing-record
  - id: billing.charge-failed
    description: Fired when a billing charge fails.
    name: Billing Charge-failed
    entityRef: billing-record
  - id: billing.dunning-exhausted
    description: Fired when all dunning retries are exhausted.
    name: Billing Dunning-exhausted
    entityRef: billing-record
operations:
  - id: subscribe-to-plan
    name: subscribeToPlan
    method: POST
    path: /customers/{customerId}/subscriptions
    pathParams:
      - name: customerId
        type: uuid
        entityRef: customer
        fieldRef: id
    inputMode: body
    inputEntity: subscription
    outputMode: single
    outputEntity: subscription
    intentRef: activate-trial-subscription
    ruleRefs:
      - activate-on-trial-start
    scenarioRefs:
      - subscription-created-in-trial
      - subscription-created-without-trial
    errorResponses:
      - statusCode: 404
        code: CUSTOMER_NOT_FOUND
      - statusCode: 404
        code: PLAN_NOT_FOUND
      - statusCode: 409
        code: SUBSCRIPTION_ALREADY_EXISTS
        description: Customer already has an active or trialing subscription.
      - statusCode: 422
        code: PLAN_NOT_ACTIVE
        description: The requested plan is not available for new subscriptions.
    auth:
      required: true
      schemes:
        - bearer
      roles:
        - customer
        - admin
    operationContract:
      steps:
        - id: apply-trial-activation
          type: apply-rule
          ruleRef: activate-on-trial-start
          onFailure:
            throw: PLAN_NOT_ACTIVE
        - id: persist-subscription
          type: db-write
          onFailure:
            throw: SUBSCRIPTION_ALREADY_EXISTS
        - id: emit-created
          type: emit-event
          eventRef: subscription.created
          onFailure:
            log: warn
            continue: true
        - id: emit-trial-started
          type: emit-event
          eventRef: subscription.trial-started
          onFailure:
            log: warn
            continue: true
  - id: renew-subscription
    name: renewSubscription
    method: POST
    path: /subscriptions/{subscriptionId}/renew
    pathParams:
      - name: subscriptionId
        type: uuid
        entityRef: subscription
        fieldRef: id
    inputMode: none
    outputMode: single
    outputEntity: subscription
    intentRef: renew-active-subscription
    ruleRefs:
      - convert-trial-on-renewal
    scenarioRefs:
      - trial-converts-to-active
      - active-subscription-renewed
      - renewal-fails-moves-to-past-due
    errorResponses:
      - statusCode: 404
        code: SUBSCRIPTION_NOT_FOUND
      - statusCode: 409
        code: SUBSCRIPTION_NOT_RENEWABLE
        description: Only trialing or active subscriptions can be renewed.
      - statusCode: 422
        code: PAYMENT_METHOD_MISSING
        description: No payment method on file for this customer.
      - statusCode: 402
        code: PAYMENT_FAILED
        description: Payment attempt failed. Subscription moved to past-due.
    auth:
      required: true
      schemes:
        - bearer
      roles:
        - billing-service
        - admin
    operationContract:
      steps:
        - id: convert-trial-if-applicable
          type: apply-rule
          ruleRef: convert-trial-on-renewal
          onFailure:
            throw: SUBSCRIPTION_NOT_RENEWABLE
        - id: charge-payment
          type: call-operation
          target: payment.charge
          inputs:
            customerId: subscription.customerId
            amount: plan.price
            periodStart: subscription.currentPeriodStart
            periodEnd: subscription.currentPeriodEnd
          onSuccess: continue
          onFailure:
            throw: PAYMENT_FAILED
          onVersionMismatch: retry-with-backoff
          compensatedBy:
            type: call-operation
            target: payment.refund
            inputs:
              billingRecordId: charge-payment.output.billingRecordId
        - id: extend-period
          type: db-write
          onFailure:
            throw: SUBSCRIPTION_NOT_RENEWABLE
        - id: emit-renewed
          type: emit-event
          eventRef: subscription.renewed
          onFailure:
            log: warn
            continue: true
  - id: cancel-subscription
    name: cancelSubscription
    method: POST
    path: /subscriptions/{subscriptionId}/cancel
    pathParams:
      - name: subscriptionId
        type: uuid
        entityRef: subscription
        fieldRef: id
    inputMode: none
    outputMode: single
    outputEntity: subscription
    intentRef: cancel-subscription
    ruleRefs:
      - cancel-at-period-end
    scenarioRefs:
      - active-subscription-cancelled
      - trialing-subscription-cancelled
      - expired-subscription-cannot-be-cancelled
    errorResponses:
      - statusCode: 404
        code: SUBSCRIPTION_NOT_FOUND
      - statusCode: 409
        code: SUBSCRIPTION_NOT_CANCELLABLE
        description: Only trialing or active subscriptions can be cancelled.
    auth:
      required: true
      schemes:
        - bearer
      roles:
        - customer
        - admin
    operationContract:
      steps:
        - id: apply-cancellation-rule
          type: apply-rule
          ruleRef: cancel-at-period-end
          onFailure:
            throw: SUBSCRIPTION_NOT_CANCELLABLE
        - id: persist-cancellation
          type: db-write
          onFailure:
            throw: SUBSCRIPTION_NOT_CANCELLABLE
        - id: emit-cancelled
          type: emit-event
          eventRef: subscription.cancelled
          onFailure:
            log: warn
            continue: true
  - id: retry-payment
    name: retryPayment
    method: POST
    path: /subscriptions/{subscriptionId}/retry
    pathParams:
      - name: subscriptionId
        type: uuid
        entityRef: subscription
        fieldRef: id
    inputMode: none
    outputMode: single
    outputEntity: subscription
    intentRef: handle-dunning
    ruleRefs:
      - handle-dunning-retry
    scenarioRefs:
      - dunning-retry-succeeds
      - dunning-exhausted-cancels-subscription
    errorResponses:
      - statusCode: 404
        code: SUBSCRIPTION_NOT_FOUND
      - statusCode: 409
        code: SUBSCRIPTION_NOT_PAST_DUE
        description: Retry only applies to past-due subscriptions.
      - statusCode: 409
        code: DUNNING_EXHAUSTED
        description: Maximum retry attempts reached. Subscription cancelled.
      - statusCode: 402
        code: PAYMENT_FAILED
        description: Payment retry failed.
    auth:
      required: true
      schemes:
        - bearer
      roles:
        - billing-service
        - admin
    operationContract:
      steps:
        - id: apply-dunning-rule
          type: apply-rule
          ruleRef: handle-dunning-retry
          onFailure:
            throw: SUBSCRIPTION_NOT_PAST_DUE
        - id: attempt-payment
          type: call-operation
          target: payment.charge
          inputs:
            customerId: subscription.customerId
            amount: plan.price
          onSuccess: continue
          onFailure:
            throw: PAYMENT_FAILED
          onVersionMismatch: retry-with-backoff
        - id: emit-outcome
          type: emit-event
          eventRef: billing.charge-succeeded
          onFailure:
            log: warn
            continue: true
  - id: get-subscription
