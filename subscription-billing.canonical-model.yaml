knownVectors:
  - id: entity-access-ungoverned
    surface: operation-layer
    description: >
      Operation implementations can read or write any entity without declaration. The canonical model has no
      reads/writes field on operations and the gate has no mechanism to verify entity access at the operation layer.
    severity: high
    affectedComponents:
      - src/operations/
      - gate.js Pass 4
    discoveredAt: '2026-03-05'
    discoveredBy: architecture-assessment
    rationale: >
      Deferred — static entity access analysis requires AST-level parsing or module boundary enforcement. Neither is
      reliable at current stage.
    resolution: pending
    resolutionTarget: FABRIC Phase 2 Sprint C
  - id: cross-object-calls-ungoverned-at-runtime
    surface: operation-layer
    description: >
      This domain declares cross-object calls to payment.charge and payment.refund in operation contracts. At build time
      the gate verifies the step declarations. At runtime there is no enforcement that the calls go to the correct
      provider version or that the response matches the declared contract. Rolling deployment version mismatches are
      silent.
    severity: high
    affectedComponents:
      - src/operations/renew-subscription.ts
      - src/operations/retry-payment.ts
    discoveredAt: '2026-03-05'
    discoveredBy: architecture-assessment
    rationale: >
      Runtime enforcement via response version headers and generated adapter validators is designed but not yet built.
      Deferred to FABRIC Phase 2 Sprint C.
    resolution: pending
    resolutionTarget: FABRIC Phase 2 Sprint C
