# ─────────────────────────────────────────────────────────────────────────────
# DKCE CI Pipeline — .github/workflows/dkce.yml
# Runs the full DKCE pipeline: validate → gate → codegen → tsc → scenarios → chain
# Plus: oasdiff breaking change detection (Gap 7) on PRs
#
# Trigger: push/PR to main + manual dispatch with model selection
# ─────────────────────────────────────────────────────────────────────────────

name: DKCE Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      model:
        description: 'Canonical model to process'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - example
          - subscription-billing
      run_fill:
        description: 'Run AI fill stage (requires ANTHROPIC_API_KEY)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Validate canonical models against JSON Schema
  # ─────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate Canonical Models
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Validate example.canonical-model.yaml
        if: >-
          github.event.inputs.model == 'all' ||
          github.event.inputs.model == 'example' ||
          github.event.inputs.model == ''
        run: node validate.js files/example.canonical-model.yaml

      - name: Validate subscription-billing.canonical-model.yaml
        if: >-
          github.event.inputs.model == 'all' ||
          github.event.inputs.model == 'subscription-billing' ||
          github.event.inputs.model == ''
        run: node validate.js files/subscription-billing.canonical-model.yaml
        continue-on-error: true  # 167 pre-existing schema errors — tracked for cleanup (VERIFY-04)

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: (Optional) AI Fill — only on manual dispatch with run_fill=true
  # ─────────────────────────────────────────────────────────────────────────
  fill:
    name: AI Fill (Manual Only)
    runs-on: ubuntu-latest
    needs: validate
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_fill == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Run fill.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY not set — cannot run fill stage"
            exit 1
          fi
          node fill.js files/example.canonical-model.yaml
          node fill.js files/subscription-billing.canonical-model.yaml

      - name: Upload filled templates
        uses: actions/upload-artifact@v4
        with:
          name: filled-templates
          path: |
            templates/
            templates-subscription/

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Gate — enforce filled templates (Pass 1-4)
  # ─────────────────────────────────────────────────────────────────────────
  gate:
    name: Enforcement Gate (Pass 1-4)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Gate — example model
        if: >-
          github.event.inputs.model == 'all' ||
          github.event.inputs.model == 'example' ||
          github.event.inputs.model == ''
        run: node gate.js --model files/example.canonical-model.yaml

      - name: Gate — subscription-billing model
        if: >-
          github.event.inputs.model == 'all' ||
          github.event.inputs.model == 'subscription-billing' ||
          github.event.inputs.model == ''
        run: node gate.js --model files/subscription-billing.canonical-model.yaml

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Codegen — generate all artifacts
  # ─────────────────────────────────────────────────────────────────────────
  codegen:
    name: Code Generation
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Codegen — example model
        if: >-
          github.event.inputs.model == 'all' ||
          github.event.inputs.model == 'example' ||
          github.event.inputs.model == ''
        run: node codegen.js files/example.canonical-model.yaml

      - name: Codegen — subscription-billing model
        if: >-
          github.event.inputs.model == 'all' ||
          github.event.inputs.model == 'subscription-billing' ||
          github.event.inputs.model == ''
        run: node codegen.js files/subscription-billing.canonical-model.yaml

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-artifacts
          path: |
            generated/
            generated-subscription/

  # ─────────────────────────────────────────────────────────────────────────
  # Job 5: TypeScript compiler — drift wall
  # ─────────────────────────────────────────────────────────────────────────
  tsc:
    name: TypeScript Compile Check
    runs-on: ubuntu-latest
    needs: codegen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Download generated artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-artifacts

      - name: tsc --noEmit
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────
  # Job 6: Scenario Runner — Gate Stage 2
  # ─────────────────────────────────────────────────────────────────────────
  scenario-runner:
    name: Scenario Runner Tests
    runs-on: ubuntu-latest
    needs: codegen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Download generated artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-artifacts

      - name: Run scenario tests
        run: npx jest --ci --forceExit

  # ─────────────────────────────────────────────────────────────────────────
  # Job 7: oasdiff — OpenAPI breaking change detection (PRs only, Gap 7)
  # ─────────────────────────────────────────────────────────────────────────
  oasdiff:
    name: OpenAPI Breaking Change Check
    runs-on: ubuntu-latest
    needs: codegen
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Download generated artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-artifacts

      - name: Check for breaking changes
        run: node oasdiff-check.js

  # ─────────────────────────────────────────────────────────────────────────
  # Job 8: Chain Record — append-only audit trail (push to main only)
  # ─────────────────────────────────────────────────────────────────────────
  chain-record:
    name: Chain Record (main only)
    runs-on: ubuntu-latest
    needs: [tsc, scenario-runner]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Record pipeline run — example model
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL not set — skipping chain record"
            exit 0
          fi
          node chain.js record \
            --model files/example.canonical-model.yaml \
            --stage codegen \
            --artifact-dir generated/ \
            --status pass

      - name: Record pipeline run — subscription-billing model
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL not set — skipping chain record"
            exit 0
          fi
          node chain.js record \
            --model files/subscription-billing.canonical-model.yaml \
            --stage codegen \
            --artifact-dir generated-subscription/ \
            --status pass

  # ─────────────────────────────────────────────────────────────────────────
  # Job 9: Deploy Gate — all checks must pass before merge
  # ─────────────────────────────────────────────────────────────────────────
  deploy-gate:
    name: Deploy Gate
    runs-on: ubuntu-latest
    needs: [tsc, scenario-runner, oasdiff]
    if: always()
    steps:
      - name: Check all upstream jobs
        run: |
          echo "tsc result: ${{ needs.tsc.result }}"
          echo "scenario-runner result: ${{ needs.scenario-runner.result }}"
          echo "oasdiff result: ${{ needs.oasdiff.result }}"
          # tsc and scenario-runner must succeed
          if [ "${{ needs.tsc.result }}" != "success" ] || [ "${{ needs.scenario-runner.result }}" != "success" ]; then
            echo "::error::Deploy gate failed — tsc or scenario-runner did not succeed"
            exit 1
          fi
          # oasdiff must succeed or be skipped (skipped on push to main)
          if [ "${{ needs.oasdiff.result }}" != "success" ] && [ "${{ needs.oasdiff.result }}" != "skipped" ]; then
            echo "::error::Deploy gate failed — oasdiff detected breaking changes"
            exit 1
          fi
          echo "✓ Deploy gate passed — all checks green"
