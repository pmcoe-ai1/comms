    scenarioRefs: [order-confirmed-on-payment, order-not-confirmed-on-failed-payment]
    effectiveFrom: "2026-03-04T00:00:00Z"
    changeNoticeDays: 30
    backwardCompatible: true
    signatures:
      - { organisationId: order-service, signedBy: tom.baker, signedAt: "2026-03-04T10:30:00Z" }
      - { organisationId: payments-service, signedBy: sara.lee, signedAt: "2026-03-04T11:00:00Z" }

# ─────────────────────────────────────────────────────────────────────────────
# KNOWN OPEN VECTORS
# Declared governance gaps — enforced by declaration, not yet by tooling.
# Each entry is a machine-readable record of an ungoverned surface.
# Resolution status is tracked here until tooling closes the gap.
# ─────────────────────────────────────────────────────────────────────────────

knownVectors:

  - id: entity-access-ungoverned
    surface: operation-layer
    description: >
      Operation implementations can read or write any entity without
      declaration. The canonical model has no reads/writes field on
      operations, and the gate has no mechanism to verify entity access
      at the operation layer. An operation in this domain could import
      and access an entity from a foreign domain directly — bypassing
      declared contracts — without the compiler or gate catching it.
    severity: high
    affectedComponents:
      - src/operations/
      - gate.js Pass 3
    discoveredAt: "2026-03-05"
    discoveredBy: architecture-assessment
    rationale: >
      Static analysis of entity access requires either AST-level code
      parsing to trace imports through the call graph, or a module
      structure that makes cross-entity imports impossible by construction.
      Neither is reliable at the current stage. A reads/writes declaration
      on operations without gate enforcement creates false confidence —
      worse than no declaration. Deferred until AST analysis approach
      is proven or module boundary enforcement is designed.
    resolution: pending
    resolutionApproach: >
      Three candidate approaches under evaluation:
      1. TypeScript module boundary enforcement — structure generated
         code so cross-domain entity imports are impossible by the
         module graph, not by convention.
      2. AST-level gate pass — parse operation implementations and
         trace entity access through the import graph. High
         implementation cost, uncertain reliability.
      3. Runtime interception — generated adapter middleware records
         every entity access at the boundary. Catches violations
         after they occur rather than preventing them.
      Decision required before FABRIC Phase 2 Sprint C.
    resolutionTarget: FABRIC Phase 2 Sprint C
    relatedGaps:
      - reads-writes-declaration-deferred
      - operation-layer-ungoverned
