# Domain: subscription billing
#
# Exercises: recurring lifecycle, trial periods, billing cycles, proration,
#   cancellation with refund logic, multi-entity rules, cross-entity operation
#   contracts, renewal automation, dunning (failed payment retry), upgrade/
#   downgrade plan changes mid-cycle.
# ─────────────────────────────────────────────────────────────────────────────

