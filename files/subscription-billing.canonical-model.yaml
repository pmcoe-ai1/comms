# ─────────────────────────────────────────────────────────────────────────────
# GLOSSARY
# ─────────────────────────────────────────────────────────────────────────────

glossary:

  - id: subscription
    term: Subscription
    definition: >
      A recurring agreement between a customer and the platform to provide
      access to a plan in exchange for periodic payment. A subscription is
      active when payment is current and the trial period (if any) has not
      expired without conversion.
    examples:
      - "Customer subscribes to Pro plan — a Subscription is created in trial status"
    counterexamples:
      - "A one-time purchase is not a Subscription"
    precision:
      type: enum
      values: [trialing, active, past-due, cancelled, expired]
    conceptVersion: "1.0"

  - id: plan
    term: Plan
    definition: >
      A named tier of service with a declared price, billing interval, and
      feature set. Plans are versioned — a customer subscribes to a specific
      plan version.
    conceptVersion: "1.0"

  - id: billing-cycle
    term: Billing Cycle
    definition: >
      The recurring period for which a subscription is charged. Defined by
      the plan's interval (monthly or annual). A billing cycle begins on the
      subscription's anchor date and ends on the next anchor date.
    precision:
      type: enum
      values: [monthly, annual]
    conceptVersion: "1.0"

  - id: trial-period
    term: Trial Period
    definition: >
      An optional period at the start of a subscription during which the
      customer has full access but is not charged. Trial ends on trialEndsAt.
      If the customer does not cancel before trialEndsAt, the subscription
      converts to active and the first billing cycle begins.
    precision:
      type: range
      min: 0
      max: 90
      unit: days
    conceptVersion: "1.0"

  - id: proration
    term: Proration
    definition: >
      A partial charge or credit calculated when a subscription changes plan
      mid-cycle. The customer is charged or credited for the unused portion
      of the current billing cycle at the old plan price, and charged for the
      remaining portion at the new plan price.
    conceptVersion: "1.0"

  - id: dunning
    term: Dunning
    definition: >
      The process of retrying a failed payment on a declining schedule before
      marking the subscription as cancelled. Maximum 4 retry attempts over
      7 days. If all retries fail, subscription moves to cancelled.
    precision:
      type: range
      min: 0
      max: 4
      unit: attempts
    conceptVersion: "1.0"

  - id: plan-price
    term: Plan Price
    definition: The recurring charge for one billing cycle of a plan in AUD.
    precision:
      type: range
      min: 0
      max: 99999.99
      unit: AUD
    conceptVersion: "1.0"

  - id: subscription-anchor-date
    term: Anchor Date
    definition: >
      The day of the month on which billing cycles begin and end. Set at
      subscription creation. Immutable — never changes even if the plan changes.
    conceptVersion: "1.0"

# ─────────────────────────────────────────────────────────────────────────────
# INTENTS
# ─────────────────────────────────────────────────────────────────────────────

intents:

  - id: activate-trial-subscription
    name: Activate Trial Subscription
    description: >
      When a customer subscribes to a plan with a trial period, create the
      subscription in trialing status. Do not charge until the trial ends.
    status: approved
    approvedBy: jane.smith
    approvedAt: "2026-03-05T10:00:00Z"
    version: "1.0"
    priority: must
    glossaryRefs: [subscription, trial-period, plan]
    tags: [subscriptions, trials]

  - id: convert-trial-to-active
    name: Convert Trial to Active on Renewal
    description: >
      When a trialing subscription reaches its trialEndsAt date and the
      customer has not cancelled, convert it to active and charge the first
      billing cycle immediately.
    status: approved
    approvedBy: jane.smith
    approvedAt: "2026-03-05T10:00:00Z"
    version: "1.0"
    priority: must
    glossaryRefs: [subscription, trial-period, billing-cycle]
    tags: [subscriptions, billing]

  - id: renew-active-subscription
    name: Renew Active Subscription on Cycle End
    description: >
      When an active subscription reaches the end of its billing cycle,
      charge the customer for the next cycle and extend the subscription.
      If payment fails, move subscription to past-due and begin dunning.
    status: approved
    approvedBy: jane.smith
    approvedAt: "2026-03-05T10:00:00Z"
    version: "1.0"
    priority: must
    glossaryRefs: [subscription, billing-cycle, dunning]
    tags: [subscriptions, billing, dunning]

  - id: cancel-subscription
    name: Cancel Subscription at Period End
    description: >
      When a customer cancels, mark the subscription as cancelled effective
      at the end of the current billing cycle. Do not issue a refund for the
      current period. Access continues until the cycle ends.
    status: approved
    approvedBy: jane.smith
    approvedAt: "2026-03-05T10:00:00Z"
    version: "1.0"
    priority: must
    glossaryRefs: [subscription, billing-cycle]
    tags: [subscriptions, cancellation]

  - id: handle-dunning
    name: Handle Failed Payment with Dunning
    description: >
      When a subscription payment fails, move to past-due status and schedule
      a retry. Maximum 4 retry attempts. If all retries fail, cancel the
      subscription. If a retry succeeds, return to active.
    status: approved
    approvedBy: jane.smith
    approvedAt: "2026-03-05T10:00:00Z"
    version: "1.0"
    priority: must
    glossaryRefs: [dunning, subscription]
    tags: [subscriptions, dunning, payments]

  - id: view-subscription-details
    name: View Subscription Details
    description: >
      Allow customers and administrators to view subscription information
      including current status, billing cycle dates, and plan details.
    status: approved
    approvedBy: human
    approvedAt: "2026-03-06"
    version: "1.0"
    priority: must
    glossaryRefs: [subscription]
    tags: [subscriptions, queries]

# ─────────────────────────────────────────────────────────────────────────────
# SCENARIOS
# ─────────────────────────────────────────────────────────────────────────────

scenarios:

  # activate-trial-subscription
  - id: subscription-created-in-trial
    intentRef: activate-trial-subscription
    description: Customer subscribes to Pro plan with 14-day trial
    given:
      - { entity: plan, field: id, value: "plan-pro" }
      - { entity: plan, field: trialDays, value: 14 }
      - { entity: subscription, field: status, value: "trialing" }
    when: subscribe-to-plan
    then:
      - { entity: subscription, field: status, value: "trialing" }
      - { entity: subscription, field: trialEndsAt, op: not-null }
    coverageType: happy
    expectedResult: true
    outputFieldRefs:
      - { entityId: subscription, fieldId: status, value: "trialing" }

  - id: subscription-created-without-trial
    intentRef: activate-trial-subscription
    description: Customer subscribes to Basic plan with no trial
    given:
      - { entity: plan, field: id, value: "plan-basic" }
      - { entity: plan, field: trialDays, value: 0 }
    when: subscribe-to-plan
    then:
      - { entity: subscription, field: status, value: "active" }
      - { entity: subscription, field: trialEndsAt, value: null }
    coverageType: edge
    expectedResult: true
    outputFieldRefs:
      - { entityId: subscription, fieldId: status, value: "active" }

  # convert-trial-to-active
  - id: trial-converts-to-active
    intentRef: convert-trial-to-active
    description: Trial subscription converts to active on trialEndsAt
    given:
      - { entity: subscription, field: status, value: "trialing" }
      - { entity: subscription, field: trialEndsAt, op: in-past }
    when: renew-subscription
    then:
      - { entity: subscription, field: status, value: "active" }
    coverageType: happy
    expectedResult: true
    outputFieldRefs:
      - { entityId: subscription, fieldId: status, value: "active" }

  - id: trial-not-converted-if-cancelled
    intentRef: convert-trial-to-active
    description: Cancelled trial subscription does not convert
    given:
      - { entity: subscription, field: status, value: "cancelled" }
      - { entity: subscription, field: trialEndsAt, op: in-past }
    when: renew-subscription
    then:
      - { entity: subscription, field: status, value: "cancelled" }
    coverageType: failure
    expectedResult: false

  # renew-active-subscription
  - id: active-subscription-renewed
    intentRef: renew-active-subscription
    description: Active subscription renewed successfully at cycle end
    given:
      - { entity: subscription, field: status, value: "active" }
      - { entity: subscription, field: currentPeriodEnd, op: in-past }
    when: renew-subscription
    then:
      - { entity: subscription, field: status, value: "active" }
      - { entity: subscription, field: currentPeriodEnd, op: extended }
    coverageType: happy
    expectedResult: true
    outputFieldRefs:
      - { entityId: subscription, fieldId: status, value: "active" }

  - id: renewal-fails-moves-to-past-due
    intentRef: renew-active-subscription
    description: Failed renewal payment moves subscription to past-due
    given:
      - { entity: subscription, field: status, value: "active" }
      - { entity: subscription, field: currentPeriodEnd, op: in-past }
      - { entity: subscription, field: paymentFails, value: true }
    when: renew-subscription
    then:
      - { entity: subscription, field: status, value: "past-due" }
      - { entity: subscription, field: dunningAttempts, value: 1 }
    coverageType: failure
    expectedResult: false
    outputFieldRefs:
      - { entityId: subscription, fieldId: status, value: "past-due" }
      - { entityId: subscription, fieldId: dunningAttempts, value: 1 }

  # cancel-subscription
  - id: active-subscription-cancelled
    intentRef: cancel-subscription
    description: Active subscription cancelled at period end
    given:
      - { entity: subscription, field: status, value: "active" }
    when: cancel-subscription
    then:
      - { entity: subscription, field: status, value: "cancelled" }
      - { entity: subscription, field: cancelledAt, op: not-null }
    coverageType: happy
    expectedResult: true
    outputFieldRefs:
      - { entityId: subscription, fieldId: status, value: "cancelled" }

  - id: trialing-subscription-cancelled
    intentRef: cancel-subscription
    description: Trialing subscription can be cancelled immediately
    given:
      - { entity: subscription, field: status, value: "trialing" }
    when: cancel-subscription
    then:
      - { entity: subscription, field: status, value: "cancelled" }
    coverageType: happy
    expectedResult: true
    outputFieldRefs:
      - { entityId: subscription, fieldId: status, value: "cancelled" }

  - id: expired-subscription-cannot-be-cancelled
    intentRef: cancel-subscription
    description: Expired subscription cannot be cancelled again
    given:
      - { entity: subscription, field: status, value: "expired" }
    when: cancel-subscription
    then:
      - error: SUBSCRIPTION_NOT_CANCELLABLE
    coverageType: failure
    expectedResult: false

  # handle-dunning
  - id: dunning-retry-succeeds
    intentRef: handle-dunning
    description: Dunning retry succeeds and subscription returns to active
    given:
      - { entity: subscription, field: status, value: "past-due" }
      - { entity: subscription, field: dunningAttempts, value: 1 }
    when: retry-payment
    then:
      - { entity: subscription, field: status, value: "active" }
      - { entity: subscription, field: dunningAttempts, value: 0 }
    coverageType: happy
    expectedResult: true
    outputFieldRefs:
      - { entityId: subscription, fieldId: status, value: "active" }

  - id: dunning-exhausted-cancels-subscription
    intentRef: handle-dunning
    description: All dunning retries exhausted — subscription cancelled
    given:
      - { entity: subscription, field: status, value: "past-due" }
      - { entity: subscription, field: dunningAttempts, value: 3 }
    when: retry-payment
    then:
      - { entity: subscription, field: status, value: "cancelled" }
    coverageType: failure
    expectedResult: true
    outputFieldRefs:
      - { entityId: subscription, fieldId: status, value: "cancelled" }

# ─────────────────────────────────────────────────────────────────────────────
# SCENARIO COVERAGE
# ─────────────────────────────────────────────────────────────────────────────

scenarioCoverage:

  - intentRef: activate-trial-subscription
    minimumScenarios: 2
    mustInclude: [happy, failure]
    scenarioRefs: [subscription-created-in-trial, subscription-created-without-trial]

  - intentRef: convert-trial-to-active
    minimumScenarios: 2
    mustInclude: [happy, failure]
    scenarioRefs: [trial-converts-to-active, trial-not-converted-if-cancelled]

  - intentRef: renew-active-subscription
    minimumScenarios: 2
    mustInclude: [happy, failure]
    scenarioRefs: [active-subscription-renewed, renewal-fails-moves-to-past-due]

  - intentRef: cancel-subscription
    minimumScenarios: 3
    mustInclude: [happy, failure]
    scenarioRefs: [active-subscription-cancelled, trialing-subscription-cancelled, expired-subscription-cannot-be-cancelled]

  - intentRef: handle-dunning
    minimumScenarios: 2
    mustInclude: [happy, failure]
    scenarioRefs: [dunning-retry-succeeds, dunning-exhausted-cancels-subscription]

# ─────────────────────────────────────────────────────────────────────────────
# ENTITIES
# ─────────────────────────────────────────────────────────────────────────────

entities:

  - id: plan
    name: Plan
    description: A named tier of service with price and billing interval.
    fields:
      - { id: id, name: id, type: uuid, required: true, immutable: true, systemField: true, glossaryRef: plan }
      - { id: name, name: name, type: string, required: true, glossaryRef: plan }
      - { id: price, name: price, type: decimal, required: true, validation: { min: 0, max: 99999.99 }, glossaryRef: plan-price }
      - { id: interval, name: interval, type: enum, enumValues: [monthly, annual], required: true, glossaryRef: billing-cycle }
      - { id: trial-days, name: trialDays, type: integer, required: false, default: 0, validation: { min: 0, max: 90 }, glossaryRef: trial-period }
      - { id: is-active, name: isActive, type: boolean, required: true, default: true }
      - { id: created-at, name: createdAt, type: datetime, required: true, immutable: true, systemField: true }

  - id: subscription
    name: Subscription
    description: A recurring billing agreement between a customer and a plan.
    fields:
      - { id: id, name: id, type: uuid, required: true, immutable: true, systemField: true, glossaryRef: subscription }
      - { id: customer-id, name: customerId, type: uuid, required: true, immutable: true, refEntity: customer, glossaryRef: subscription }
      - { id: plan-id, name: planId, type: uuid, required: true, refEntity: plan, glossaryRef: plan }
      - { id: status, name: status, type: enum, enumValues: [trialing, active, past-due, cancelled, expired], required: true, glossaryRef: subscription }
      - { id: trial-ends-at, name: trialEndsAt, type: datetime, required: false, nullable: true, glossaryRef: trial-period }
      - { id: current-period-start, name: currentPeriodStart, type: datetime, required: true, glossaryRef: billing-cycle }
      - { id: current-period-end, name: currentPeriodEnd, type: datetime, required: true, glossaryRef: billing-cycle }
      - { id: anchor-date, name: anchorDate, type: integer, required: true, immutable: true, validation: { min: 1, max: 28 }, glossaryRef: subscription-anchor-date }
      - { id: dunning-attempts, name: dunningAttempts, type: integer, required: true, default: 0, validation: { min: 0, max: 4 }, glossaryRef: dunning }
      - { id: cancelled-at, name: cancelledAt, type: datetime, required: false, nullable: true }
      - { id: created-at, name: createdAt, type: datetime, required: true, immutable: true, systemField: true }
      - { id: updated-at, name: updatedAt, type: datetime, required: true, systemField: true }
    lifecycle:
      field: status
      initial: trialing
      transitions:
        - { from: trialing, to: active, trigger: trial-ends-without-cancellation, operationRef: renew-subscription }
        - { from: trialing, to: cancelled, trigger: customer-cancels, operationRef: cancel-subscription }
        - { from: active, to: past-due, trigger: payment-fails, operationRef: renew-subscription }
        - { from: active, to: cancelled, trigger: customer-cancels, operationRef: cancel-subscription }
        - { from: active, to: active, trigger: renewal-succeeds, operationRef: renew-subscription }
        - { from: past-due, to: active, trigger: retry-payment-succeeds, operationRef: retry-payment }
        - { from: past-due, to: cancelled, trigger: dunning-exhausted, operationRef: retry-payment }
        - { from: cancelled, to: active, trigger: reactivation, operationRef: reactivate-subscription }
    indexes:
      - { fields: [customer-id], unique: false }
      - { fields: [status], unique: false }
      - { fields: [current-period-end], unique: false }
    softDelete: false

  - id: billing-record
    name: BillingRecord
    description: A record of a billing event — charge, refund, or credit — for a subscription.
    fields:
      - { id: id, name: id, type: uuid, required: true, immutable: true, systemField: true }
      - { id: subscription-id, name: subscriptionId, type: uuid, required: true, immutable: true, refEntity: subscription }
      - { id: type, name: type, type: enum, enumValues: [charge, refund, credit], required: true, immutable: true }
      - { id: amount, name: amount, type: decimal, required: true, immutable: true, validation: { min: 0, max: 99999.99 } }
      - { id: status, name: status, type: enum, enumValues: [pending, succeeded, failed], required: true }
      - { id: period-start, name: periodStart, type: datetime, required: true, immutable: true }
      - { id: period-end, name: periodEnd, type: datetime, required: true, immutable: true }
      - { id: attempt-number, name: attemptNumber, type: integer, required: true, default: 1, validation: { min: 1, max: 3 } }
      - { id: created-at, name: createdAt, type: datetime, required: true, immutable: true, systemField: true }

  - id: customer
    name: Customer
    description: A registered user who has one or more subscriptions.
    fields:
      - { id: id, name: id, type: uuid, required: true, immutable: true, systemField: true }
      - { id: email, name: email, type: string, required: true, unique: true }
      - { id: payment-method-id, name: paymentMethodId, type: string, required: false, nullable: true }
      - { id: created-at, name: createdAt, type: datetime, required: true, immutable: true, systemField: true }

# ─────────────────────────────────────────────────────────────────────────────
# RULES
# ─────────────────────────────────────────────────────────────────────────────

rules:

  - id: activate-on-trial-start
    name: activateOnTrialStart
    entityRef: subscription
    intentRef: activate-trial-subscription
    description: >
      If the plan has a trial period (trialDays > 0), the subscription starts
      in trialing status with trialEndsAt set. If trialDays is 0, the
      subscription starts in active status immediately.
    condition: null
    action: null
    scenarioRefs: [subscription-created-in-trial, subscription-created-without-trial]
    priority: 1

  - id: convert-trial-on-renewal
    name: convertTrialOnRenewal
    entityRef: subscription
    intentRef: convert-trial-to-active
    description: >
      If a subscription is in trialing status and trialEndsAt is in the past,
      transition to active. If the subscription is not in trialing status,
      return unchanged.
    condition: null
    action: null
    scenarioRefs: [trial-converts-to-active, trial-not-converted-if-cancelled]
    priority: 2

  - id: cancel-at-period-end
    name: cancelAtPeriodEnd
    entityRef: subscription
    intentRef: cancel-subscription
    description: >
      A subscription may be cancelled if it is in trialing or active status.
      Set status to cancelled and record cancelledAt. If the subscription is
      already expired or cancelled, throw SUBSCRIPTION_NOT_CANCELLABLE.
    condition:
      type: OR
      conditions:
        - { field: status, op: eq, value: "trialing" }
        - { field: status, op: eq, value: "active" }
    action:
      type: set
      field: status
      value: cancelled
    scenarioRefs: [active-subscription-cancelled, trialing-subscription-cancelled, expired-subscription-cannot-be-cancelled]
    priority: 3

  - id: handle-dunning-retry
    name: handleDunningRetry
    entityRef: subscription
    intentRef: handle-dunning
    description: >
      If dunningAttempts is less than 3, the subscription may retry payment.
      If dunningAttempts equals 3, cancel the subscription — dunning exhausted.
    condition:
      type: AND
      conditions:
        - { field: status, op: eq, value: "past-due" }
        - { field: dunning-attempts, op: lte, value: 3 }
    action:
      type: set
      field: dunning-attempts
      value:
        $add:
          left: { $field: dunning-attempts }
          right: { $value: 1 }
    scenarioRefs: [dunning-retry-succeeds, dunning-exhausted-cancels-subscription]
    priority: 4

# ─────────────────────────────────────────────────────────────────────────────
# EVENTS
# ─────────────────────────────────────────────────────────────────────────────

events:
  - { id: subscription.created, description: Fired when a new subscription is created. }
  - { id: subscription.activated, description: Fired when a subscription moves to active status. }
  - { id: subscription.cancelled, description: Fired when a subscription is cancelled. }
  - { id: subscription.past-due, description: Fired when a subscription moves to past-due status. }
  - { id: subscription.renewed, description: Fired when a subscription is successfully renewed. }
  - { id: subscription.trial-started, description: Fired when a trial subscription is created. }
  - { id: subscription.trial-converted, description: Fired when a trial converts to active. }
  - { id: billing.charge-succeeded, description: Fired when a billing charge succeeds. }
  - { id: billing.charge-failed, description: Fired when a billing charge fails. }
  - { id: billing.dunning-exhausted, description: Fired when all dunning retries are exhausted. }

# ─────────────────────────────────────────────────────────────────────────────
# OPERATIONS
# ─────────────────────────────────────────────────────────────────────────────

operations:

  - id: subscribe-to-plan
    name: subscribeToPlan
    method: POST
    path: /customers/{customerId}/subscriptions
    pathParams:
      - { name: customerId, type: uuid, entityRef: customer, fieldRef: id }
    inputMode: body
    inputEntity: subscription
    outputMode: single
    outputEntity: subscription
    intentRef: activate-trial-subscription
    ruleRefs: [activate-on-trial-start]
    scenarioRefs: [subscription-created-in-trial, subscription-created-without-trial]
    errorResponses:
      - { statusCode: 404, code: CUSTOMER_NOT_FOUND }
      - { statusCode: 404, code: PLAN_NOT_FOUND }
      - { statusCode: 409, code: SUBSCRIPTION_ALREADY_EXISTS, description: Customer already has an active or trialing subscription. }
      - { statusCode: 422, code: PLAN_NOT_ACTIVE, description: The requested plan is not available for new subscriptions. }
    auth: { required: true, schemes: [bearer], roles: [customer, admin] }
    operationContract:
      steps:
        - id: apply-trial-activation
          type: apply-rule
          ruleRef: activate-on-trial-start
          onFailure:
            throw: PLAN_NOT_ACTIVE

        - id: persist-subscription
          type: db-write
          onFailure:
            throw: SUBSCRIPTION_ALREADY_EXISTS

        - id: emit-created
          type: emit-event
          eventRef: subscription.created
          onFailure:
            log: warn
            continue: true

        - id: emit-trial-started
          type: emit-event
          eventRef: subscription.trial-started
          onFailure:
            log: warn
            continue: true

  - id: renew-subscription
    name: renewSubscription
    method: POST
    path: /subscriptions/{subscriptionId}/renew
    pathParams:
      - { name: subscriptionId, type: uuid, entityRef: subscription, fieldRef: id }
    inputMode: none
    outputMode: single
    outputEntity: subscription
    intentRef: renew-active-subscription
    ruleRefs: [convert-trial-on-renewal]
    scenarioRefs: [trial-converts-to-active, active-subscription-renewed, renewal-fails-moves-to-past-due]
    errorResponses:
      - { statusCode: 404, code: SUBSCRIPTION_NOT_FOUND }
      - { statusCode: 409, code: SUBSCRIPTION_NOT_RENEWABLE, description: Only trialing or active subscriptions can be renewed. }
      - { statusCode: 422, code: PAYMENT_METHOD_MISSING, description: No payment method on file for this customer. }
      - { statusCode: 402, code: PAYMENT_FAILED, description: Payment attempt failed. Subscription moved to past-due. }
    auth: { required: true, schemes: [bearer], roles: [billing-service, admin] }
    operationContract:
      steps:
        - id: convert-trial-if-applicable
          type: apply-rule
          ruleRef: convert-trial-on-renewal
          onFailure:
            throw: SUBSCRIPTION_NOT_RENEWABLE

        - id: charge-payment
          type: call-operation
          target: payment.charge
          inputs:
            customerId: subscription.customerId
            amount: plan.price
            periodStart: subscription.currentPeriodStart
            periodEnd: subscription.currentPeriodEnd
          onSuccess: continue
          onFailure:
            throw: PAYMENT_FAILED
          onVersionMismatch: retry-with-backoff
          compensatedBy:
            type: call-operation
            target: payment.refund
            inputs:
              billingRecordId: charge-payment.output.billingRecordId

        - id: extend-period
          type: db-write
          onFailure:
            throw: SUBSCRIPTION_NOT_RENEWABLE

        - id: emit-renewed
          type: emit-event
          eventRef: subscription.renewed
          onFailure:
            log: warn
            continue: true

  - id: cancel-subscription
    name: cancelSubscription
    method: POST
    path: /subscriptions/{subscriptionId}/cancel
    pathParams:
      - { name: subscriptionId, type: uuid, entityRef: subscription, fieldRef: id }
    inputMode: none
    outputMode: single
    outputEntity: subscription
    intentRef: cancel-subscription
    ruleRefs: [cancel-at-period-end]
    scenarioRefs: [active-subscription-cancelled, trialing-subscription-cancelled, expired-subscription-cannot-be-cancelled]
    errorResponses:
      - { statusCode: 404, code: SUBSCRIPTION_NOT_FOUND }
      - { statusCode: 409, code: SUBSCRIPTION_NOT_CANCELLABLE, description: Only trialing or active subscriptions can be cancelled. }
    auth: { required: true, schemes: [bearer], roles: [customer, admin] }
    operationContract:
      steps:
        - id: apply-cancellation-rule
          type: apply-rule
          ruleRef: cancel-at-period-end
          onFailure:
            throw: SUBSCRIPTION_NOT_CANCELLABLE

        - id: persist-cancellation
          type: db-write
          onFailure:
            throw: SUBSCRIPTION_NOT_CANCELLABLE

        - id: emit-cancelled
          type: emit-event
          eventRef: subscription.cancelled
          onFailure:
            log: warn
            continue: true

  - id: retry-payment
    name: retryPayment
    method: POST
    path: /subscriptions/{subscriptionId}/retry
    pathParams:
      - { name: subscriptionId, type: uuid, entityRef: subscription, fieldRef: id }
    inputMode: none
    outputMode: single
    outputEntity: subscription
    intentRef: handle-dunning
    ruleRefs: [handle-dunning-retry]
    scenarioRefs: [dunning-retry-succeeds, dunning-exhausted-cancels-subscription]
    errorResponses:
      - { statusCode: 404, code: SUBSCRIPTION_NOT_FOUND }
      - { statusCode: 409, code: SUBSCRIPTION_NOT_PAST_DUE, description: Retry only applies to past-due subscriptions. }
      - { statusCode: 409, code: DUNNING_EXHAUSTED, description: Maximum retry attempts reached. Subscription cancelled. }
      - { statusCode: 402, code: PAYMENT_FAILED, description: Payment retry failed. }
    auth: { required: true, schemes: [bearer], roles: [billing-service, admin] }
    operationContract:
      steps:
        - id: apply-dunning-rule
          type: apply-rule
          ruleRef: handle-dunning-retry
          onFailure:
            throw: SUBSCRIPTION_NOT_PAST_DUE

        - id: attempt-payment
          type: call-operation
          target: payment.charge
          inputs:
            customerId: subscription.customerId
            amount: plan.price
          onSuccess: continue
          onFailure:
            throw: PAYMENT_FAILED
          onVersionMismatch: retry-with-backoff

        - id: emit-outcome
          type: emit-event
          eventRef: billing.charge-succeeded
          onFailure:
            log: warn
            continue: true

  - id: get-subscription
    name: getSubscription
    method: GET
    path: /subscriptions/{subscriptionId}
    pathParams:
      - { name: subscriptionId, type: uuid, entityRef: subscription, fieldRef: id }
    inputMode: none
    outputMode: single
    outputEntity: subscription
    intentRef: view-subscription-details
    errorResponses:
      - { statusCode: 404, code: SUBSCRIPTION_NOT_FOUND }
    auth: { required: true, schemes: [bearer], roles: [customer, admin] }

  - id: list-subscriptions
    name: listSubscriptions
    method: GET
    path: /customers/{customerId}/subscriptions
    pathParams:
      - { name: customerId, type: uuid, entityRef: customer, fieldRef: id }
    inputMode: query
    inputEntity: subscription
    outputMode: collection
    outputEntity: subscription
    intentRef: view-subscription-details
    pagination:
      strategy: cursor
      defaultSize: 20
      maxSize: 100
      sortableFields: [created-at, status]
      filterableFields: [status]
    errorResponses:
      - { statusCode: 404, code: CUSTOMER_NOT_FOUND }
    auth: { required: true, schemes: [bearer], roles: [customer, admin] }

  - id: reactivate-subscription
    name: reactivateSubscription
    method: POST
    path: /subscriptions/{subscriptionId}/reactivate
    pathParams:
      - { name: subscriptionId, type: uuid, entityRef: subscription, fieldRef: id }
    inputMode: none
    outputMode: single
    outputEntity: subscription
    intentRef: activate-trial-subscription
    errorResponses:
      - { statusCode: 404, code: SUBSCRIPTION_NOT_FOUND }
      - { statusCode: 409, code: SUBSCRIPTION_NOT_REACTIVATABLE, description: Only cancelled subscriptions can be reactivated. }
      - { statusCode: 422, code: PAYMENT_METHOD_MISSING }
    auth: { required: true, schemes: [bearer], roles: [customer, admin] }

